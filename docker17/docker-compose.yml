services:
  backend:
    container_name: laravel
    build: ./laravel_pintores
    restart: always
    ports:
      - 8000:80
    volumes:
      - scripts:/var/www/html
    depends_on:
      - db
  db:
    image: mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=laravel
    volumes:
      - datos_bbdd:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    depends_on:
      - db
    ports:
      - 8080:80
    environment:
      PMA_HOST: db

volumes:
  scripts:
  datos_bbdd: